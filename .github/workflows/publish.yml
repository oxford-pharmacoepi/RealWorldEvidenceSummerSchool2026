on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

name: Publish Site

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check pre-rendered site
        run: |
          if [ ! -d "_site" ]; then
            echo "::error::_site does not exist. Render locally and commit _site before pushing."
            exit 1
          fi

          if [ -z "$(find _site -mindepth 1 -print -quit)" ]; then
            echo "::error::_site is empty. Render locally and commit the generated files before pushing."
            exit 1
          fi

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Publish
        if: github.event_name != 'pull_request'
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
          render: false
          publish_dir: ./_site
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
